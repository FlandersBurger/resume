services:
  app:
    image: ghcr.io/flandersburger/resume:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      REDISTOGO_URL: redis://redis:6379
      REDIS_HOST: redis
    env_file:
      - .env
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
