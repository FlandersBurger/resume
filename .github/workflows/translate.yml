name: Translate

on:
  push:
    branches: [master]
    paths:
      - "data/locales/master/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_MASTER_CHAT: ${{ secrets.TELEGRAM_MASTER_CHAT }}

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Translate locales
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          cd src/scripts
          node i18n-scanner.js en ar de es fr hi id ja ko nl pt ru tl

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locales/
          git diff --cached --quiet || git commit -m "chore: update translations [skip ci]"
          git push

      - name: Notify Telegram on failure
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          text: "❌ Translation failed\n<a href='https://github.com/${{ github.repository }}/commit/${{ github.sha }}'>${{ github.sha }}</a>"
